services:
  postgres:
    image: 'postgres:16.3'
    container_name: postgres-db
    environment:
      - 'POSTGRES_DB=move_db'
      - 'POSTGRES_PASSWORD=move_pass'
      - 'POSTGRES_USER=move_user'
    ports:
      - '5433:5432'

  redis:
    image: 'redis:8.6.2'
    container_name: move-redis
    ports:
      - '6377:6379'
  zookeeper:
    image: 'zookeeper:3.9.5'
    container_name: move-zookeeper
    ports:
      - '2181:2181'

  kafka:
    image: 'apache/kafka:4.0.2'
    container_name: move-kafka
    environment:
      - 'KAFKA_BROKER_ID=1'
      - 'KAFKA_ZOOKEEPER_CONNECT=move-zookeeper:2181'
      - 'KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      - 'KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://move-kafka:9092,PLAINTEXT_HOST://localhost:9093'
      - 'KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1'
    ports:
      - '9099:9092'
      - '9098:9093'
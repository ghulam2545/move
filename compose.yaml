services:
  postgres:
    image: 'postgres:16.3'
    container_name: postgres-db
    environment:
      - 'POSTGRES_DB=move_db'
      - 'POSTGRES_PASSWORD=move_pass'
      - 'POSTGRES_USER=move_user'
    ports:
      - '5433:5432'
  redis:
    image: 'redis:8.6.2'
    container_name: move-redis
    ports:
      - '6377:6379'
